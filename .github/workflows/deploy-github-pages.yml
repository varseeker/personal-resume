# Build and deploy the Vite app to GitHub Pages.
# Repository: https://github.com/varseeker/personal-resume
# Live site: https://varseeker.github.io/personal-resume/
#
# IMPORTANT — Settings → Pages → Build and deployment → Source MUST be "GitHub Actions".
# If Source is "Deploy from a branch", GitHub serves repo-root index.html (dev template with
# /src/main.jsx) → blank white page. Disable branch deploy; use only this workflow.

name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Project site: https://<user>.github.io/<repo>/  →  base /repo/
      # User/org site: https://<user>.github.io/  →  base /
      - name: Build
        run: |
          REPO="${{ github.event.repository.name }}"
          if [[ "$REPO" == *.github.io ]]; then
            export VITE_BASE_PATH="/"
          else
            export VITE_BASE_PATH="/$REPO/"
          fi
          echo "VITE_BASE_PATH=$VITE_BASE_PATH"
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
